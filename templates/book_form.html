{% extends "base.html" %}
{% block title %}{{ 'Edit' if book else 'Add' }} Book — LibraryOS{% endblock %}
{% block page_title %}{{ 'Edit Book' if book else 'Add New Book' }}{% endblock %}

{% block topbar_actions %}
<a href="{{ url_for('books') }}" class="btn btn-ghost btn-sm">← Back to Books</a>
{% endblock %}

{% block content %}
<div class="form-card">
  <form method="POST">
    <div class="form-grid">
      <div class="form-group full">
        <label>Book Title *</label>
        <input type="text" name="title" placeholder="Full book title" required value="{{ book.title if book else '' }}">
      </div>
      <div class="form-group full">
        <label>Author(s) *</label>
        <input type="text" name="author" placeholder="Author name(s)" required value="{{ book.author if book else '' }}">
      </div>
      <div class="form-group">
        <label>ISBN</label>
        <input type="text" name="isbn" placeholder="978-XXXXXXXXXX" value="{{ book.isbn if book else '' }}">
      </div>
      <div class="form-group">
        <label>Genre</label>
        <select name="genre">
          <option value="">Select genre</option>
          {% for g in ['Technology','Fiction','Non-Fiction','Autobiography','History','Science','Self-Help','Finance','Philosophy','Other'] %}
          <option value="{{ g }}" {% if book and book.genre==g %}selected{% endif %}>{{ g }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Publisher</label>
        <input type="text" name="publisher" placeholder="Publisher name" value="{{ book.publisher if book else '' }}">
      </div>
      <div class="form-group">
        <label>Year Published</label>
        <input type="number" name="year_published" placeholder="2024" min="1800" max="2025" value="{{ book.year_published if book else '' }}">
      </div>
      <div class="form-group full">
        <label>Total Copies</label>
        <input type="number" name="total_copies" min="1" max="100" value="{{ book.total_copies if book else 1 }}" required>
      </div>
      <div class="form-group full">
        <label>Description</label>
        <textarea name="description" placeholder="Brief description of the book…">{{ book.description if book else '' }}</textarea>
      </div>
    </div>
    <div style="margin-top:24px;display:flex;gap:12px">
      <button type="submit" class="btn btn-primary">{{ '💾 Update Book' if book else '+ Add Book' }}</button>
      <a href="{{ url_for('books') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
